# Portal Scanner Configuration for Callie Wells
# Scanned daily by career-ops pipeline
#
# PRIMARY: scripts/serpapi_scan.py (Google Jobs API via SerpAPI)
#   - Key: C:\Users\rjain\OneDrive - Technijian, Inc\Documents\VSCODE\keys\serpapi.md
#   - Reliable structured results (no blocking like WebFetch)
#   - 100 searches/month free tier - use strategically
#   - Batch via: python scripts/serpapi_batch.py --days N
#
# FALLBACK: WebFetch for specific URLs when SerpAPI budget exhausted
#
# NEVER store the API key in the repo. OneDrive path only.

# ═══════════════════════════════════════════════════════════
#  JOB BOARDS — General (high volume)
# ═══════════════════════════════════════════════════════════

job_boards:

  # ── Indeed ──
  indeed:
    enabled: true
    base_url: "https://www.indeed.com/jobs"
    params:
      l: "Rancho Santa Margarita, CA"
      radius: 50
      sort: "date"
      fromage: 1
    queries:
      - "interior design consultant"
      - "interior designer assistant"
      - "design coordinator residential"
      - "home staging"
      - "in-home design consultant"
      - "showroom manager design"
      - "project coordinator design firm"
      - "administrative coordinator design"
      - "office manager design"
      - "client services coordinator design"
      - "design consultant remodeling"

  # ── LinkedIn Jobs ──
  linkedin:
    enabled: true
    base_url: "https://www.linkedin.com/jobs/search"
    params:
      location: "Orange County, California, United States"
      distance: 50
      sortBy: "DD"  # date posted
      f_TPR: "r86400"  # last 24 hours
    queries:
      - "interior design consultant"
      - "interior designer assistant"
      - "home staging"
      - "design coordinator"
      - "showroom manager"
      - "project coordinator design"
      - "client services coordinator"
      - "in-home design consultant"

  # ── Indeed ADMIN ASSISTANT (25mi tight radius) ──
  # Pure admin roles that leverage Callie's BBA + coordination experience
  # Tight 25mi radius because admin work requires short commute
  indeed_admin:
    enabled: true
    base_url: "https://www.indeed.com/jobs"
    params:
      l: "Rancho Santa Margarita, CA"
      radius: 25
      sort: "date"
      fromage: 1
    queries:
      - "administrative assistant"
      - "executive assistant"
      - "administrative coordinator"

  # ── LinkedIn ADMIN ASSISTANT (25mi tight radius) ──
  linkedin_admin:
    enabled: true
    base_url: "https://www.linkedin.com/jobs/search"
    params:
      location: "Rancho Santa Margarita, California"
      distance: 25
      sortBy: "DD"
      f_TPR: "r86400"
    queries:
      - "administrative assistant"
      - "executive assistant"

  # ── Indeed REMOTE (all 50 states) ──
  indeed_remote:
    enabled: true
    base_url: "https://www.indeed.com/jobs"
    params:
      l: "Remote"
      remotejob: "032b3046-06a3-4876-8dfd-474eb5e7ed11"  # remote-only filter
      sort: "date"
      fromage: 1
    queries:
      - "interior design remote"
      - "remote interior designer"
      - "virtual interior designer"
      - "online interior designer"
      - "remote interior design consultant"
      - "e-design interior designer"

  # ── LinkedIn REMOTE (all 50 states) ──
  linkedin_remote:
    enabled: true
    base_url: "https://www.linkedin.com/jobs/search"
    params:
      location: "United States"
      f_WT: "2"  # 2 = Remote
      f_TPR: "r86400"
      sortBy: "DD"
    queries:
      - "interior designer"
      - "interior design consultant"
      - "interior design specialist"
      - "virtual interior designer"
      - "e-design interior"
      - "spatial designer"
      - "interior design assistant"

  # ── ZipRecruiter ──
  ziprecruiter:
    enabled: true
    base_url: "https://www.ziprecruiter.com/jobs-search"
    params:
      search.location: "Rancho Santa Margarita, CA"
      refine_by_location_type: "within_50_miles"
      days: 1
    queries:
      - "interior design consultant"
      - "interior designer assistant"
      - "home staging"
      - "design coordinator"
      - "showroom manager"
      - "in-home design consultant"
      - "design consultant remodeling"
      - "project coordinator design"

  # ── Glassdoor ──
  glassdoor:
    enabled: true
    base_url: "https://www.glassdoor.com/Job/jobs.htm"
    params:
      locT: "C"
      locKeyword: "Orange County, CA"
      radius: 50
      fromAge: 1
    queries:
      - "interior design consultant"
      - "interior designer"
      - "home staging"
      - "design coordinator"
      - "showroom manager"
      - "project coordinator design"

# ═══════════════════════════════════════════════════════════
#  JOB BOARDS — Design/Creative Specific
# ═══════════════════════════════════════════════════════════

  # ── Houzz ──
  houzz:
    enabled: true
    base_url: "https://www.houzz.com/jobs"
    notes: "Interior designers and home pros post jobs here"
    queries:
      - "interior designer Orange County"
      - "home stager Orange County"
      - "design consultant Orange County"
      - "showroom Orange County"

  # ── ASID Career Center ──
  asid:
    enabled: true
    base_url: "https://www.asid.org/career-center"
    notes: "American Society of Interior Designers career board"
    queries:
      - "interior designer California"
      - "design assistant California"
      - "project coordinator California"

  # ── Design Jobs Board ──
  designjobsboard:
    enabled: true
    base_url: "https://www.designjobsboard.com"
    notes: "Design-industry-specific job board"
    queries:
      - "interior designer"
      - "design coordinator"
      - "home staging"

  # ── Coroflot ──
  coroflot:
    enabled: true
    base_url: "https://www.coroflot.com/jobs"
    notes: "Design industry job board — broader design roles"
    queries:
      - "interior design"
      - "design consultant"
      - "showroom"

