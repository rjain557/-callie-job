    - "senior architect"
    - "licensed architect"
    - "civil engineer"
    - "mechanical engineer"
    - "registered nurse"
    - "medical"
    - "dental"
  companies: []  # none excluded yet

scoring:
  weights:
    cv_match: 0.30
    role_fit: 0.25
    compensation: 0.20
    location: 0.15
    culture: 0.10
  thresholds:
    auto_apply: 4.0     # score >= this: generate everything and email
    recommend: 3.5       # score >= this: create job file, send kit to Callie
    skip: 3.5            # score < this: log but don't apply

followup:
  first_followup_days: 5   # calendar days after application
  second_followup_days: 10
  max_followups: 2
